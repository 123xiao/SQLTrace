<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 日志文件图标 -->
  <rect x="30" y="25" width="50" height="60" rx="4" fill="#2a3f5f" stroke="#77D4FF" stroke-width="2"/>

  <!-- 日志行 -->
  <line x1="38" y1="35" x2="72" y2="35" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="45" x2="65" y2="45" stroke="#77D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="55" x2="70" y2="55" stroke="#f6c24b" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="65" x2="60" y2="65" stroke="#77D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="75" x2="68" y2="75" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>

  <!-- 放大镜 -->
  <circle cx="75" cy="70" r="12" fill="none" stroke="#f6c24b" stroke-width="3"/>
  <line x1="84" y1="79" x2="95" y2="90" stroke="#f6c24b" stroke-width="3" stroke-linecap="round"/>

  <!-- SQL 符号 -->
  <text x="60" y="108" font-family="monospace" font-size="14" font-weight="bold" fill="#77D4FF" text-anchor="middle">SQL</text>
</svg>
